services:
  entra-hygiene:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    ports:
      - "5454:5454"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
