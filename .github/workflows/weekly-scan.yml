name: Entra Hygiene Scan

on:
  schedule:
    - cron: '0 6 * * 0'  # Sunday 06:00 UTC (09:00 Jerusalem)
  workflow_dispatch:
    inputs:
      checks:
        description: 'Check IDs to run (comma-separated). Leave empty to run all.'
        required: false
        default: ''
      send_email:
        description: 'Send HTML report by email after scan'
        type: boolean
        default: true

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install --quiet .

      - name: Run scan
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          CHECKS_INPUT: ${{ github.event.inputs.checks }}
        run: |
          set +e
          if [ -n "$CHECKS_INPUT" ]; then
            entra-hygiene scan --output json --checks "$CHECKS_INPUT" > report.json
          else
            entra-hygiene scan --output json > report.json
          fi
          scan_code=$?
          set -e
          python3 -c "
          from entra_hygiene.models import ScanResult
          from entra_hygiene.reporters.html_reporter import render_html
          result = ScanResult.model_validate_json(open('report.json').read())
          print(render_html(result))
          " > report.html
          [ $scan_code -eq 0 ] || [ $scan_code -eq 2 ]

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: entra-hygiene-${{ github.run_id }}
          path: |
            report.html
            report.json
          retention-days: 30

      - name: Email report
        if: github.event.inputs.send_email != 'false'
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
        run: python .github/scripts/send_report.py
